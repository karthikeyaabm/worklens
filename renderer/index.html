<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkLens | Employee Timelog & Activity Tracking</title>

  <meta name="title" content="WorkLens | Employee Timelog & Activity Tracking">
  <meta name="description"
    content="WorkLens is a desktop application that tracks employee daily working hours, activity logs, productivity, and automated timelog synchronization with real-time insights.">
  <meta name="author" content="Karthikeya Kondavathri">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="widget-container">
    <!-- Header Section -->
    <header class="widget-header">
      <div class="header-left">
        <div class="header-icon-container">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="#3b82f6" stroke-width="2.5" fill="rgba(59, 130, 246, 0.15)" />
            <path d="M12 6V12L15.5 14" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <span id="header-title" class="header-title"></span>
      </div>
      <div class="header-right">
        <span id="date-display" class="date-main">May 16</span>
        <!---span id="day-display" class="date-sub">Friday</span>--->
      </div>
    </header>

    <!-- Info Cards Grid Section -->
    <div class="widget-grid">
      <!-- Redmine Efforts Card -->
      <div class="info-card">
        <div class="card-header">
          <svg class="card-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 8V12L15 14" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" />
            <circle cx="12" cy="12" r="9" stroke="#60a5fa" stroke-width="2" />
          </svg>
          <span>Time Logs</span>
        </div>
        <div class="card-body">
          <div class="time-row ">
            <span class="label">Y</span>
            <span class="separator">:</span>
            <span id="redmine-yesterday" class="value">0h</span>
          </div>
          <div class="time-row">
            <span class="label">T</span>
            <span class="separator">:</span>
            <span id="redmine-today" class="value">0h</span>
          </div>
        </div>
      </div>

      <!-- Active Time Tracking Card -->
      <div class="info-card">
        <div class="card-header">
          <div class="status-container">
            <span id="status-dot" class="status-dot active"></span>
          </div>
          <span>Active Time</span>
        </div>
        <div class="card-body">
          <div class="time-row">
            <span class="label">Y</span>
            <span class="separator">:</span>
            <span id="active-yesterday" class="value">0h</span>
          </div>
          <div class="time-row">
            <span class="label">T</span>
            <span class="separator">:</span>
            <span id="active-today" class="value">0h</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
