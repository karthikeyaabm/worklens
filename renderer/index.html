<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Timelog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="widget-container">
    <!-- Header Section -->
    <header class="widget-header">
      <div class="header-left">
        <div class="header-icon-container">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="#2563EB" stroke-width="2.5" fill="rgba(37, 99, 235, 0.15)"/>
            <path d="M12 6V12L15.5 14" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="header-title">Daily Timelog</span>
      </div>
    </header>

    <!-- Date & Total Section -->
    <div class="date-section">
      <div class="date-left">
        <div class="calendar-icon-container">
          <svg class="calendar-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="4" stroke="#2563EB" stroke-width="2" fill="rgba(37, 99, 235, 0.1)"/>
            <path d="M16 2V6" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 2V6" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 10H21" stroke="#2563EB" stroke-width="2"/>
            <circle cx="8" cy="14" r="1.5" fill="#2563EB"/>
            <circle cx="12" cy="14" r="1.5" fill="#2563EB"/>
            <circle cx="16" cy="14" r="1.5" fill="#2563EB"/>
            <circle cx="8" cy="18" r="1.5" fill="#2563EB"/>
            <circle cx="12" cy="18" r="1.5" fill="#2563EB"/>
          </svg>
        </div>
        <div class="date-text-container">
          <span id="date-display" class="date-main">May 16, 2025</span>
          <span id="day-display" class="date-sub">Friday</span>
        </div>
      </div>
      
      <div class="date-right">
        <div class="total-badge">
          <span id="total-time">Total: 07h 45m</span>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
